<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run Detail — Dungeon Agents</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <a href="/" class="back">&laquo; BACK</a>
        <h1 id="run-title">Loading...</h1>
        <div id="run-meta" class="meta"></div>
    </header>

    <nav class="tab-bar">
        <button class="tab-btn active" data-tab="replay">&#9654; REPLAY</button>
        <button class="tab-btn" data-tab="langfuse">&#11835; LANGFUSE TRACE</button>
    </nav>

    <main class="run-detail">
        <!-- Left: Grid -->
        <section class="panel grid-panel">
            <canvas id="grid-canvas" width="400" height="400"></canvas>
            <div id="grid-legend" class="legend">
                <span class="legend-item"><span class="swatch wall"></span>Wall</span>
                <span class="legend-item"><span class="swatch floor"></span>Floor</span>
                <span class="legend-item"><span class="swatch door-locked"></span>Door &#x1F512;</span>
                <span class="legend-item"><span class="swatch door-unlocked"></span>Door &#x1F513;</span>
                <span class="legend-item"><span class="swatch exit"></span>Exit</span>
                <span class="legend-item"><span class="swatch key-item"></span>Key</span>
                <span class="legend-item"><span class="swatch agent-a"></span>Agent A</span>
                <span class="legend-item"><span class="swatch agent-b"></span>Agent B</span>
            </div>
        </section>

        <!-- Right: Agent panels -->
        <section class="panel agents-panel">
            <div id="agent-a-panel" class="agent-card">
                <div class="agent-card-header">
                    <h3 class="agent-a-color">&#9670; AGENT A</h3>
                </div>
                <div class="agent-card-body agent-body"></div>
            </div>
            <div id="agent-b-panel" class="agent-card">
                <div class="agent-card-header">
                    <h3 class="agent-b-color">&#9670; AGENT B</h3>
                </div>
                <div class="agent-card-body agent-body"></div>
            </div>
        </section>
    </main>

    <!-- Diagnosis panel -->
    <section class="diagnosis-section" id="diagnosis-panel" style="display:none">
        <div class="diagnosis-header">
            <span class="diagnosis-label">RUN DIAGNOSIS</span>
            <span id="diagnosis-mode" class="diagnosis-mode-badge"></span>
        </div>
        <div class="diagnosis-body">
            <div class="diagnosis-stats" id="diagnosis-stats"></div>
            <ul class="diagnosis-insights" id="diagnosis-insights"></ul>
        </div>
    </section>

    <!-- Causal Chain -->
    <section class="causal-section" id="causal-panel" style="display:none">
        <div class="causal-header">
            <span class="causal-label">WHY IT HAPPENED</span>
            <span id="causal-summary" class="causal-summary"></span>
        </div>
        <div id="causal-windows"></div>
    </section>

    <!-- Timeline -->
    <section class="timeline-section">
        <div class="transport">
            <button id="btn-first" title="First turn">&laquo;</button>
            <button id="btn-prev" title="Previous (Left arrow)">&lsaquo;</button>
            <button id="btn-play" title="Play/Pause (Space)">&#9654;</button>
            <button id="btn-next" title="Next (Right arrow)">&rsaquo;</button>
            <button id="btn-last" title="Last turn">&raquo;</button>
            <span id="turn-display">Turn 0 / 0</span>
        </div>
        <canvas id="timeline-canvas" height="80"></canvas>
    </section>

    <!-- Langfuse trace tab (hidden until selected) -->
    <div id="tab-langfuse-panel" style="display:none">
        <div class="lf-toolbar">
            <span id="lf-status" class="lf-status"></span>
            <button id="lf-refresh" class="lf-refresh-btn" title="Refresh from Langfuse">&#8635; Refresh</button>
            <a id="lf-external-link" href="#" target="_blank" class="lf-ext-link" style="display:none">&#8599; Open in Langfuse</a>
        </div>
        <div id="lf-scores" class="lf-scores"></div>
        <div id="lf-tree" class="lf-tree"></div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/grid.js"></script>
    <script src="/js/timeline.js"></script>
    <script src="/js/replay.js"></script>
    <script src="/js/langfuse_trace.js"></script>
</body>
</html>
